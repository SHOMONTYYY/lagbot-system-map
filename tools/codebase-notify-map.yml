name: Notify system map

# On every push, ping the Lagbot System Map to re-sync its code facts
# immediately (instead of waiting for the map's nightly job). Notify-only:
# this grants the map NO access to this codebase — it just fires an event.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Tell the system map to re-sync the code facts
        env:
          TOKEN: ${{ secrets.MAP_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then echo "::error::MAP_DISPATCH_TOKEN not set."; exit 1; fi
          curl -sS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/SHOMONTYYY/lagbot-system-map/dispatches \
            -d '{"event_type":"codebase-updated"}'
          echo "Pinged the system map to re-sync its code facts."
