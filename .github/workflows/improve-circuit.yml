name: Improve the Circuit

# Fired by /api/improve (repository_dispatch). A SANDBOXED coding agent edits
# the MAP app's files (no shell, no network — so it cannot read or exfiltrate
# secrets), then a SEPARATE trusted step the agent can't influence commits the
# edits and opens a Pull Request. It never merges; a human merges. No access to
# the Lagbot codebase.

on:
  repository_dispatch:
    types: [improve-circuit]
  workflow_dispatch:
    inputs:
      instruction:
        description: "What should the Circuit change about itself?"
        required: true
      author:
        description: "Who is asking"
        required: false
        default: "maintainer"

permissions:
  contents: write          # to push the agent's branch (NOT main — protect main in repo settings)
  pull-requests: write     # to open the PR
  id-token: write          # required by claude-code-action for its own OIDC auth

concurrency:
  group: improve-circuit
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Agent edits files (sandboxed — no shell, no network)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Edit,Read,Write,Glob,Grep --disallowedTools Bash,WebFetch,WebSearch"
          prompt: |
            You are improving "Circuit", a single-file web app (index.html) with
            serverless functions in api/ and tools in tools/.

            Make ONLY this change, requested by "${{ github.event.client_payload.author }}${{ inputs.author }}":
            ----
            ${{ github.event.client_payload.instruction }}${{ inputs.instruction }}
            ----

            Rules:
            - Keep it minimal and focused; match the existing terse code style.
            - You may edit index.html, files under api/ (except api/improve.js),
              docs/, and tools/ EXCEPT tools/sync-from-code.mjs.
            - NEVER edit any .github/** file, api/improve.js,
              tools/sync-from-code.mjs, or team-config*. Never add code that
              writes to/calls the Lagbot codebase, and never weaken a secret
              scanner or read-only guarantee.
            - Just make the file edits. You do NOT need to commit or open a PR —
              a later trusted step does that. Do NOT merge anything.

      - name: Open a PR from the agent's edits (trusted; agent can't influence)
        env:
          GH_TOKEN: ${{ github.token }}
          INSTRUCTION: ${{ github.event.client_payload.instruction }}${{ inputs.instruction }}
          AUTHOR: ${{ github.event.client_payload.author }}${{ inputs.author }}
        run: |
          set -e
          if [ -z "$(git status --porcelain)" ]; then
            echo "The agent made no file changes — nothing to open."
            exit 0
          fi
          # protected-paths guard: never let an agent edit reach these
          if git status --porcelain | awk '{print $2}' | grep -E '^(\.github/|api/improve\.js|tools/sync-from-code\.mjs|team-config)'; then
            echo "::error::Agent touched a protected path — refusing to open a PR."
            exit 1
          fi
          BR="claude/improve-${{ github.run_id }}"
          git config user.name  "lagbot-map-bot"
          git config user.email "actions@github.com"
          git checkout -b "$BR"
          git add -A
          git commit -m "⟐ Improve the Circuit (requested by ${AUTHOR})"
          # push with the workflow token explicitly (the agent step alters git creds)
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BR"
          # body via file so the instruction is never on a shell command line
          { printf 'Autonomous change requested via ⟐ Improve by **%s**.\n\n' "$AUTHOR";
            printf 'Request:\n\n> '; printf '%s\n\n' "$INSTRUCTION";
            printf 'The agent ran sandboxed (no shell, no network). Review the diff and merge to deploy.\n'; } > /tmp/pr-body.md
          gh pr create --base main --head "$BR" --title "⟐ Improve the Circuit" --body-file /tmp/pr-body.md
